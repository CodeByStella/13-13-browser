name: Release

on:
  push:
    tags:
      - v*
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Windows installer
        run: pnpm run dist:ci
        env:
          CI: true
          # Optional for electron-builder metadata; not embedded in the app.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Normalize installer names for electron-updater
        shell: bash
        run: |
          set -euo pipefail
          cd release
          shopt -s nullglob
          for f in *.exe *.exe.blockmap; do
            target="${f// /-}"
            if [[ "$f" != "$target" ]]; then
              mv "$f" "$target"
            fi
          done
          ls -la
          echo "---- latest.yml ----"
          cat latest.yml

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/Google-Chrome-Setup-*.exe
            release/Google-Chrome-Setup-*.blockmap
            release/latest.yml
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            release/Google-Chrome-Setup-*.exe
            release/Google-Chrome-Setup-*.blockmap
            release/latest.yml
