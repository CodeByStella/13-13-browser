<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/chrome-theme.css" />
    <title>Menu</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        --surface: #2b2b2b;
        --surface-raised: #353535;
        --text: #eef2ff;
        --text-muted: #9aa0a6;
        --accent: #5b8def;
        --privacy: #3ecf8e;
        --private: #a78bfa;
        --danger: #ef6b6b;
        --border: rgba(61, 74, 110, 0.55);
      }

      * { box-sizing: border-box; }

      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent;
        user-select: none;
      }

      .toolbar-menu-dropdown {
        width: 100%;
        padding: 6px;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: var(--surface-raised);
        box-shadow: none;
      }

      .menu-brand {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 8px 8px;
        margin-bottom: 2px;
        border-bottom: 1px solid rgba(42, 51, 80, 0.45);
      }

      .menu-brand-mark {
        font-size: 1.15rem;
        font-weight: 800;
        letter-spacing: -0.04em;
        color: var(--text);
        
      }

      .menu-brand-mark .accent { color: var(--accent); }

      .menu-brand-sub {
        font-size: 0.62rem;
        color: var(--text-muted);
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .menu-section-label {
        padding: 6px 10px 2px;
        font-size: 0.58rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--text-muted);
      }

      .menu-separator {
        height: 1px;
        margin: 4px 8px;
        background: rgba(42, 51, 80, 0.55);
      }

      .menu-item {
        display: flex;
        align-items: center;
        gap: 9px;
        width: 100%;
        padding: 7px 10px;
        border: none;
        border-radius: 7px;
        background: transparent;
        color: var(--text);
        font: inherit;
        font-size: 0.76rem;
        text-align: left;
        cursor: pointer;
        transition: background 0.12s ease, color 0.12s ease;
      }

      .menu-item:hover {
        background: rgba(255, 255, 255, 0.07);
      }

      .menu-item:active {
        background: rgba(255, 255, 255, 0.04);
        transform: scale(0.99);
      }

      .menu-icon {
        display: grid;
        place-items: center;
        width: 15px;
        height: 15px;
        flex-shrink: 0;
        color: var(--text-muted);
      }

      .menu-icon.private { color: var(--private); }
      .menu-icon.shield { color: var(--privacy); }
      .menu-icon.trash { color: var(--danger); }
      .menu-icon.info { color: var(--accent); }

      .menu-icon svg {
        width: 14px;
        height: 14px;
        fill: none;
        stroke: currentColor;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .menu-icon.shield svg,
      .menu-icon.private svg,
      .menu-icon.info svg {
        fill: currentColor;
        stroke: none;
        opacity: 0.92;
      }

      .menu-label { flex: 1; }

      kbd {
        padding: 2px 6px;
        border: 1px solid rgba(42, 51, 80, 0.55);
        border-radius: 5px;
        background: rgba(17, 22, 34, 0.85);
        color: var(--text-muted);
        font-family: inherit;
        font-size: 0.58rem;
        line-height: 1.2;
      }
    </style>
  </head>
  <body>
    <div class="toolbar-menu-dropdown" role="menu" id="menu">
      <div class="menu-brand" aria-hidden="true">
        <div>
          <div class="menu-brand-mark">Google Chrome</div>
          <div class="menu-brand-sub">Browser menu</div>
        </div>
      </div>
      <div id="items"></div>
    </div>
    <script>
      const ICONS = {
        private: '<svg viewBox="0 0 24 24"><path d="M12 3l7 4v5c0 5-3.5 8.5-7 9-3.5-.5-7-4-7-9V7l7-4z"/></svg>',
        folder: '<svg viewBox="0 0 24 24"><path d="M3 7h6l2 2h10v8a2 2 0 01-2 2H5a2 2 0 01-2-2V7z"/></svg>',
        search: '<svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3-3"/></svg>',
        shield: '<svg viewBox="0 0 24 24"><path d="M12 2l8 4v6c0 5.5-3.5 9.5-8 10-4.5-.5-8-4.5-8-10V6l8-4z"/></svg>',
        devtools: '<svg viewBox="0 0 24 24"><path d="M8 8l3 8 2-5 2 5 3-8"/><path d="M4 18h16"/></svg>',
        tab: '<svg viewBox="0 0 24 24"><rect x="3" y="7" width="18" height="13" rx="2"/><path d="M8 7V5a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>',
        duplicate: '<svg viewBox="0 0 24 24"><rect x="8" y="8" width="12" height="12" rx="2"/><path d="M4 16V6a2 2 0 012-2h10"/></svg>',
        restore: '<svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 109-9"/><path d="M3 4v5h5"/></svg>',
        reload: '<svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 0115-6"/><path d="M18 4v5h-5"/></svg>',
        zoom: '<svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M8 11h6M11 8v6"/></svg>',
        trash: '<svg viewBox="0 0 24 24"><path d="M4 7h16"/><path d="M9 7V5h6v2"/><path d="M7 7l1 12h8l1-12"/></svg>',
        info: '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 10v6M12 7h.01"/></svg>',
        tray: '<svg viewBox="0 0 24 24"><path d="M4 14h16"/><path d="M7 10l5-5 5 5"/><path d="M6 18h12"/></svg>',
      };

      function iconClass(name) {
        if (name === 'private' || name === 'shield' || name === 'trash' || name === 'info') return ` ${name}`;
        return '';
      }

      function renderItems(items) {
        const container = document.getElementById('items');
        container.innerHTML = '';

        items.forEach((item) => {
          if (item.type === 'header') {
            const label = document.createElement('div');
            label.className = 'menu-section-label';
            label.textContent = item.label;
            container.appendChild(label);
            return;
          }

          if (item.type === 'separator') {
            const sep = document.createElement('div');
            sep.className = 'menu-separator';
            sep.setAttribute('role', 'separator');
            container.appendChild(sep);
            return;
          }

          const button = document.createElement('button');
          button.type = 'button';
          button.className = 'menu-item';
          button.setAttribute('role', 'menuitem');

          const icon = document.createElement('span');
          icon.className = `menu-icon${iconClass(item.icon)}`;
          icon.innerHTML = ICONS[item.icon] || '';

          const label = document.createElement('span');
          label.className = 'menu-label';
          label.textContent = item.label;

          button.appendChild(icon);
          button.appendChild(label);

          if (item.shortcut) {
            const shortcut = document.createElement('kbd');
            shortcut.textContent = item.shortcut;
            button.appendChild(shortcut);
          }

          button.addEventListener('click', () => {
            window.chromeMenuApi.select(item.id);
          });

          container.appendChild(button);
        });
      }

      window.chromeMenuApi.onItems(renderItems);

      window.addEventListener('keydown', (event) => {
        if (event.key === 'Escape') window.close();
      });
    </script>
  </body>
</html>
