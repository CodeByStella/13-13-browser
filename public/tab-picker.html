<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/chrome-theme.css" />
    <title>Search tabs</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      }

      * { box-sizing: border-box; }

      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent;
        user-select: none;
      }

      .tab-picker-shell {
        display: flex;
        flex-direction: column;
        width: 100%;
        max-height: 100%;
        padding: 6px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--surface-raised);
        box-shadow: none;
      }

      .tab-picker-search {
        position: relative;
        flex-shrink: 0;
        margin-bottom: 4px;
      }

      .tab-picker-search-icon {
        position: absolute;
        left: 10px;
        top: 50%;
        transform: translateY(-50%);
        width: 14px;
        height: 14px;
        color: var(--text-muted);
        pointer-events: none;
      }

      .tab-picker-search input {
        width: 100%;
        height: 34px;
        padding: 0 10px 0 32px;
        border: 1px solid var(--border);
        border-radius: 7px;
        background: var(--surface);
        color: var(--text);
        font: inherit;
        font-size: 0.78rem;
        outline: none;
      }

      .tab-picker-search input:focus {
        border-color: rgba(138, 180, 248, 0.55);
        box-shadow: 0 0 0 1px rgba(138, 180, 248, 0.25);
      }

      .tab-picker-search input::placeholder {
        color: var(--text-muted);
      }

      .tab-picker-menu {
        flex: 1;
        min-height: 0;
        overflow-y: auto;
        padding: 0;
      }

      .tab-picker-menu::-webkit-scrollbar {
        width: 8px;
      }

      .tab-picker-menu::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.12);
        border-radius: 999px;
      }

      .tab-picker-item {
        display: flex;
        align-items: center;
        gap: 8px;
        width: 100%;
        padding: 7px 8px;
        border: none;
        border-radius: 7px;
        background: transparent;
        color: var(--text);
        font: inherit;
        font-size: 0.76rem;
        text-align: left;
        cursor: pointer;
      }

      .tab-picker-item:hover,
      .tab-picker-item.focused {
        background: rgba(255, 255, 255, 0.07);
      }

      .tab-picker-item.active {
        background: rgba(138, 180, 248, 0.16);
        color: #dce8ff;
      }

      .tab-picker-item.active:hover,
      .tab-picker-item.active.focused {
        background: rgba(138, 180, 248, 0.22);
      }

      .tab-picker-favicon {
        width: 16px;
        height: 16px;
        flex-shrink: 0;
        display: grid;
        place-items: center;
        color: var(--text-muted);
      }

      .tab-picker-favicon img {
        width: 14px;
        height: 14px;
        border-radius: 3px;
        object-fit: contain;
      }

      .tab-picker-favicon svg {
        width: 14px;
        height: 14px;
        fill: currentColor;
        stroke: none;
      }

      .tab-picker-favicon.private {
        color: var(--private);
      }

      .tab-picker-meta {
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
        gap: 1px;
      }

      .tab-picker-label {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .tab-picker-url {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        color: var(--text-muted);
        font-size: 0.68rem;
      }

      .tab-picker-loading {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        border: 1.5px solid rgba(138, 180, 248, 0.2);
        border-top-color: var(--accent);
        animation: tab-spin 0.75s linear infinite;
        flex-shrink: 0;
      }

      @keyframes tab-spin {
        to { transform: rotate(360deg); }
      }

      .tab-picker-empty {
        padding: 12px 8px;
        color: var(--text-muted);
        font-size: 0.76rem;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="tab-picker-shell">
      <div class="tab-picker-search">
        <svg class="tab-picker-search-icon" viewBox="0 0 16 16" aria-hidden="true">
          <circle cx="6.5" cy="6.5" r="4.25" stroke="currentColor" stroke-width="1.5" fill="none" />
          <path d="M10 10l3.5 3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
        </svg>
        <input
          type="search"
          id="search"
          placeholder="Search tabs"
          autocomplete="off"
          spellcheck="false"
          aria-label="Search tabs"
        />
      </div>
      <div class="tab-picker-menu" role="menu" id="menu"></div>
    </div>
    <script>
      const PRIVATE_ICON = '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3l7 4v5c0 5-3.5 8.5-7 9-3.5-.5-7-4-7-9V7l7-4z"/></svg>';
      const SHIELD_ICON = '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2l8 4v6c0 5.5-3.5 9.5-8 10-4.5-.5-8-4.5-8-10V6l8-4z"/></svg>';

      const searchInput = document.getElementById('search');
      const menu = document.getElementById('menu');
      let allTabs = [];
      let focusedIndex = -1;

      function labelForTab(tab) {
        return tab.isPrivate ? `Private · ${tab.title}` : tab.title;
      }

      function matchesTab(tab, query) {
        if (!query) return true;
        const q = query.toLowerCase().trim();
        const title = labelForTab(tab).toLowerCase();
        const url = String(tab.url || '').toLowerCase();
        return title.includes(q) || url.includes(q);
      }

      function filteredTabs() {
        const query = searchInput.value;
        return allTabs.filter((tab) => matchesTab(tab, query));
      }

      function renderTabs() {
        const tabs = filteredTabs();
        menu.innerHTML = '';
        focusedIndex = tabs.length > 0 ? Math.min(focusedIndex, tabs.length - 1) : -1;

        if (!allTabs.length) {
          const empty = document.createElement('div');
          empty.className = 'tab-picker-empty';
          empty.textContent = 'No tabs open';
          menu.appendChild(empty);
          return;
        }

        if (!tabs.length) {
          const empty = document.createElement('div');
          empty.className = 'tab-picker-empty';
          empty.textContent = 'No matching tabs';
          menu.appendChild(empty);
          return;
        }

        tabs.forEach((tab, index) => {
          const button = document.createElement('button');
          button.type = 'button';
          button.role = 'menuitem';
          button.className = `tab-picker-item${tab.isActive ? ' active' : ''}${index === focusedIndex ? ' focused' : ''}`;

          const favicon = document.createElement('span');
          favicon.className = `tab-picker-favicon${tab.isPrivate ? ' private' : ''}`;
          if (tab.isPrivate) {
            favicon.innerHTML = PRIVATE_ICON;
          } else if (tab.favicon) {
            const img = document.createElement('img');
            img.src = tab.favicon;
            img.alt = '';
            favicon.appendChild(img);
          } else {
            favicon.innerHTML = SHIELD_ICON;
          }

          const meta = document.createElement('span');
          meta.className = 'tab-picker-meta';

          const label = document.createElement('span');
          label.className = 'tab-picker-label';
          label.textContent = labelForTab(tab);

          const url = document.createElement('span');
          url.className = 'tab-picker-url';
          url.textContent = tab.url || '';

          meta.appendChild(label);
          if (tab.url) meta.appendChild(url);

          button.appendChild(favicon);
          button.appendChild(meta);

          if (tab.isLoading) {
            const loading = document.createElement('span');
            loading.className = 'tab-picker-loading';
            loading.setAttribute('aria-hidden', 'true');
            button.appendChild(loading);
          }

          button.addEventListener('click', () => {
            window.tabPickerApi.select(tab.id);
          });
          menu.appendChild(button);
        });
      }

      function selectFocused() {
        const tabs = filteredTabs();
        if (focusedIndex < 0 || focusedIndex >= tabs.length) return;
        window.tabPickerApi.select(tabs[focusedIndex].id);
      }

      searchInput.addEventListener('input', () => {
        focusedIndex = 0;
        renderTabs();
      });

      window.tabPickerApi.onData((tabs) => {
        allTabs = tabs;
        focusedIndex = tabs.findIndex((tab) => tab.isActive);
        if (focusedIndex < 0) focusedIndex = 0;
        renderTabs();
        searchInput.focus();
        searchInput.select();
      });

      window.addEventListener('keydown', (event) => {
        const tabs = filteredTabs();

        if (event.key === 'Escape') {
          window.tabPickerApi.close();
          return;
        }

        if (event.key === 'ArrowDown') {
          event.preventDefault();
          if (!tabs.length) return;
          focusedIndex = focusedIndex < tabs.length - 1 ? focusedIndex + 1 : 0;
          renderTabs();
          return;
        }

        if (event.key === 'ArrowUp') {
          event.preventDefault();
          if (!tabs.length) return;
          focusedIndex = focusedIndex > 0 ? focusedIndex - 1 : tabs.length - 1;
          renderTabs();
          return;
        }

        if (event.key === 'Enter') {
          event.preventDefault();
          selectFocused();
        }
      });
    </script>
  </body>
</html>
