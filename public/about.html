<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/chrome-theme.css" />
    <title>About</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        --surface: #2b2b2b;
        --surface-raised: #353535;
        --text: #eef2ff;
        --text-muted: #9aa0a6;
        --accent: #5b8def;
        --privacy: #3ecf8e;
        --border: rgba(61, 74, 110, 0.55);
        --raised: none;
      }

      * { box-sizing: border-box; }

      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent;
        user-select: none;
      }

      .about-panel {
        display: flex;
        flex-direction: column;
        height: 100%;
        border: 1px solid var(--border);
        border-radius: 14px;
        background: var(--surface-raised);
        box-shadow: none;
        overflow: hidden;
      }

      .about-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        padding: 14px 14px 10px;
        border-bottom: 1px solid rgba(42, 51, 80, 0.45);
      }

      .about-brand {
        font-size: 1.35rem;
        font-weight: 800;
        letter-spacing: -0.04em;
        color: var(--text);
      }

      .about-brand .accent { color: var(--accent); }

      .about-close {
        display: grid;
        place-items: center;
        width: 28px;
        height: 28px;
        padding: 0;
        border: 1px solid rgba(42, 51, 80, 0.45);
        border-radius: 8px;
        background: rgba(17, 22, 34, 0.7);
        color: var(--text-muted);
        cursor: pointer;
      }

      .about-close:hover { color: var(--text); background: rgba(255, 255, 255, 0.06); }

      .about-close svg {
        width: 14px;
        height: 14px;
        stroke: currentColor;
        fill: none;
        stroke-width: 2;
      }

      .about-body {
        flex: 1;
        padding: 16px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      .about-tagline {
        margin: 0;
        font-size: 0.82rem;
        line-height: 1.45;
        color: var(--text-muted);
      }

      .about-meta {
        display: grid;
        gap: 6px;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid rgba(42, 51, 80, 0.45);
        background: rgba(0, 0, 0, 0.18);
        font-size: 0.74rem;
      }

      .about-meta-row {
        display: flex;
        justify-content: space-between;
        gap: 12px;
      }

      .about-meta-row span:first-child { color: var(--text-muted); }
      .about-meta-row span:last-child { color: var(--text); font-weight: 600; }

      .about-links {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .about-link {
        display: flex;
        align-items: center;
        justify-content: space-between;
        width: 100%;
        padding: 9px 12px;
        border: 1px solid rgba(42, 51, 80, 0.45);
        border-radius: 9px;
        background: rgba(17, 22, 34, 0.55);
        color: var(--text);
        font: inherit;
        font-size: 0.76rem;
        text-align: left;
        cursor: pointer;
        transition: background 0.12s ease, border-color 0.12s ease;
      }

      .about-link:hover {
        background: rgba(255, 255, 255, 0.06);
        border-color: rgba(91, 141, 239, 0.35);
      }

      .about-link svg {
        width: 13px;
        height: 13px;
        stroke: var(--text-muted);
        fill: none;
        stroke-width: 2;
      }

      .about-footer {
        margin-top: auto;
        padding-top: 8px;
        font-size: 0.68rem;
        color: var(--text-muted);
        text-align: center;
      }

      .about-footer .privacy-dot {
        color: var(--privacy);
        font-weight: 700;
      }

      .about-update {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .about-update-status {
        margin: 0;
        font-size: 0.74rem;
        line-height: 1.45;
        color: var(--text-muted);
        min-height: 1.1rem;
      }

      .about-update-status.ok { color: var(--privacy); }
      .about-update-status.warn { color: #f0c674; }
      .about-update-status.error { color: #ef6b6b; }

      .about-update-progress {
        height: 4px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
        overflow: hidden;
      }

      .about-update-progress.hidden { display: none; }

      .about-update-progress span {
        display: block;
        height: 100%;
        width: 0;
        border-radius: inherit;
        background: linear-gradient(90deg, var(--accent), #7aa8ff);
        transition: width 0.15s ease;
      }

      .about-update-btn {
        width: 100%;
        padding: 9px 12px;
        border: 1px solid rgba(42, 51, 80, 0.45);
        border-radius: 9px;
        background: rgba(91, 141, 239, 0.16);
        color: #dce8ff;
        font: inherit;
        font-size: 0.76rem;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.12s ease, border-color 0.12s ease;
      }

      .about-update-btn:hover:not(:disabled) {
        background: rgba(91, 141, 239, 0.28);
        border-color: rgba(91, 141, 239, 0.45);
      }

      .about-update-btn:disabled {
        opacity: 0.55;
        cursor: default;
      }

      .about-update-btn.hidden { display: none; }
    </style>
  </head>
  <body>
    <aside class="about-panel" role="dialog" aria-label="About Google Chrome">
      <div class="about-header">
        <div class="about-brand">Google Chrome</div>
        <button type="button" class="about-close" id="close-btn" aria-label="Close">
          <svg viewBox="0 0 24 24"><path d="M6 6l12 12M18 6L6 18"/></svg>
        </button>
      </div>
      <div class="about-body" id="body">
        <p class="about-tagline" id="tagline"></p>
        <div class="about-meta">
          <div class="about-meta-row"><span>Version</span><span id="version">—</span></div>
          <div class="about-meta-row"><span>License</span><span id="license">—</span></div>
        </div>
        <div class="about-links">
          <button type="button" class="about-link" id="repo-link">
            <span>View on GitHub</span>
            <svg viewBox="0 0 24 24"><path d="M7 17L17 7M17 7H9M17 7v8"/></svg>
          </button>
          <button type="button" class="about-link" id="donate-link">
            <span>Donate</span>
            <svg viewBox="0 0 24 24"><path d="M7 17L17 7M17 7H9M17 7v8"/></svg>
          </button>
        </div>
        <div class="about-update" id="update-section">
          <p class="about-update-status" id="update-status"></p>
          <div class="about-update-progress hidden" id="update-progress" aria-hidden="true">
            <span id="update-progress-bar"></span>
          </div>
          <button type="button" class="about-update-btn hidden" id="update-btn">Check for updates</button>
        </div>
        <p class="about-footer">Designed for users who expect the <span class="privacy-dot">best privacy</span> possible.</p>
      </div>
    </aside>
    <script>
      let repoUrl = '';
      const updateStatus = document.getElementById('update-status');
      const updateBtn = document.getElementById('update-btn');
      const updateProgress = document.getElementById('update-progress');
      const updateProgressBar = document.getElementById('update-progress-bar');

      function applyData(data) {
        repoUrl = data.repository;
        document.getElementById('tagline').textContent = data.tagline;
        document.getElementById('version').textContent = data.version;
        document.getElementById('license').textContent = data.license;
      }

      function renderUpdate(state) {
        updateStatus.className = 'about-update-status';
        updateProgress.classList.add('hidden');
        updateBtn.classList.add('hidden');
        updateBtn.disabled = false;

        switch (state.status) {
          case 'unsupported':
            updateStatus.textContent = 'Updates are available in the installed app.';
            return;
          case 'checking':
            updateStatus.textContent = 'Checking GitHub Releases for updates…';
            updateBtn.textContent = 'Checking…';
            updateBtn.disabled = true;
            updateBtn.classList.remove('hidden');
            return;
          case 'available':
            updateStatus.textContent = `Version ${state.version} is available.`;
            updateStatus.classList.add('warn');
            updateBtn.textContent = `Download ${state.version}`;
            updateBtn.classList.remove('hidden');
            return;
          case 'not-available':
            updateStatus.textContent = "You're on the latest version.";
            updateStatus.classList.add('ok');
            updateBtn.textContent = 'Check again';
            updateBtn.classList.remove('hidden');
            return;
          case 'downloading':
            updateStatus.textContent = `Downloading update… ${state.percent ?? 0}%`;
            updateProgress.classList.remove('hidden');
            updateProgress.setAttribute('aria-hidden', 'false');
            updateProgressBar.style.width = `${state.percent ?? 0}%`;
            updateBtn.textContent = 'Downloading…';
            updateBtn.disabled = true;
            updateBtn.classList.remove('hidden');
            return;
          case 'downloaded':
            updateStatus.textContent = `Version ${state.version} is ready to install.`;
            updateStatus.classList.add('ok');
            updateBtn.textContent = 'Restart to update';
            updateBtn.classList.remove('hidden');
            return;
          case 'error':
            updateStatus.textContent = state.message || 'Could not check for updates.';
            updateStatus.classList.add('error');
            updateBtn.textContent = 'Try again';
            updateBtn.classList.remove('hidden');
            return;
          case 'idle':
          default:
            updateStatus.textContent = 'Check for a newer version from GitHub Releases.';
            updateBtn.textContent = 'Check for updates';
            updateBtn.classList.remove('hidden');
        }
      }

      async function handleUpdateAction() {
        const state = await window.aboutApi.getUpdateState();
        if (state.status === 'available') {
          await window.aboutApi.downloadUpdate();
          return;
        }
        if (state.status === 'downloaded') {
          await window.aboutApi.installUpdate();
          return;
        }
        await window.aboutApi.checkForUpdates();
      }

      document.getElementById('close-btn').addEventListener('click', () => {
        window.aboutApi.close();
      });

      document.getElementById('repo-link').addEventListener('click', () => {
        if (repoUrl) void window.aboutApi.openExternal(repoUrl);
      });

      document.getElementById('donate-link').addEventListener('click', () => {
        void window.aboutApi.openExternal('https://nowpayments.io/donation/stellaray777');
      });

      updateBtn.addEventListener('click', () => {
        void handleUpdateAction();
      });

      window.addEventListener('keydown', (event) => {
        if (event.key === 'Escape') window.aboutApi.close();
      });

      window.aboutApi.onData(applyData);
      window.aboutApi.onUpdateState(renderUpdate);
      void window.aboutApi.getUpdateState().then(renderUpdate);
    </script>
  </body>
</html>
