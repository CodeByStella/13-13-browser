<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>About</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        --surface: #111622;
        --surface-raised: #171d2e;
        --text: #eef2ff;
        --text-muted: #8892b0;
        --accent: #5b8def;
        --privacy: #3ecf8e;
        --border: rgba(61, 74, 110, 0.55);
        --raised: 0 10px 28px rgba(0, 0, 0, 0.48), inset 0 1px 0 rgba(255, 255, 255, 0.06);
      }

      * { box-sizing: border-box; }

      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent;
        user-select: none;
      }

      .about-panel {
        display: flex;
        flex-direction: column;
        height: 100%;
        border: 1px solid var(--border);
        border-radius: 14px;
        background: linear-gradient(180deg, #1c2438 0%, var(--surface) 100%);
        box-shadow: var(--raised);
        overflow: hidden;
      }

      .about-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        padding: 14px 14px 10px;
        border-bottom: 1px solid rgba(42, 51, 80, 0.45);
      }

      .about-brand {
        font-size: 1.35rem;
        font-weight: 800;
        letter-spacing: -0.04em;
        color: var(--text);
      }

      .about-brand .accent { color: var(--accent); }

      .about-close {
        display: grid;
        place-items: center;
        width: 28px;
        height: 28px;
        padding: 0;
        border: 1px solid rgba(42, 51, 80, 0.45);
        border-radius: 8px;
        background: rgba(17, 22, 34, 0.7);
        color: var(--text-muted);
        cursor: pointer;
      }

      .about-close:hover { color: var(--text); background: rgba(255, 255, 255, 0.06); }

      .about-close svg {
        width: 14px;
        height: 14px;
        stroke: currentColor;
        fill: none;
        stroke-width: 2;
      }

      .about-body {
        flex: 1;
        padding: 16px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      .about-tagline {
        margin: 0;
        font-size: 0.82rem;
        line-height: 1.45;
        color: var(--text-muted);
      }

      .about-meta {
        display: grid;
        gap: 6px;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid rgba(42, 51, 80, 0.45);
        background: rgba(0, 0, 0, 0.18);
        font-size: 0.74rem;
      }

      .about-meta-row {
        display: flex;
        justify-content: space-between;
        gap: 12px;
      }

      .about-meta-row span:first-child { color: var(--text-muted); }
      .about-meta-row span:last-child { color: var(--text); font-weight: 600; }

      .about-links {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .about-link {
        display: flex;
        align-items: center;
        justify-content: space-between;
        width: 100%;
        padding: 9px 12px;
        border: 1px solid rgba(42, 51, 80, 0.45);
        border-radius: 9px;
        background: rgba(17, 22, 34, 0.55);
        color: var(--text);
        font: inherit;
        font-size: 0.76rem;
        text-align: left;
        cursor: pointer;
        transition: background 0.12s ease, border-color 0.12s ease;
      }

      .about-link:hover {
        background: rgba(255, 255, 255, 0.06);
        border-color: rgba(91, 141, 239, 0.35);
      }

      .about-link svg {
        width: 13px;
        height: 13px;
        stroke: var(--text-muted);
        fill: none;
        stroke-width: 2;
      }

      .about-footer {
        margin-top: auto;
        padding-top: 8px;
        font-size: 0.68rem;
        color: var(--text-muted);
        text-align: center;
      }

      .about-footer .privacy-dot {
        color: var(--privacy);
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <aside class="about-panel" role="dialog" aria-label="About 13.13 Browser">
      <div class="about-header">
        <div class="about-brand">13<span class="accent">.13</span> Browser</div>
        <button type="button" class="about-close" id="close-btn" aria-label="Close">
          <svg viewBox="0 0 24 24"><path d="M6 6l12 12M18 6L6 18"/></svg>
        </button>
      </div>
      <div class="about-body" id="body">
        <p class="about-tagline" id="tagline"></p>
        <div class="about-meta">
          <div class="about-meta-row"><span>Version</span><span id="version">—</span></div>
          <div class="about-meta-row"><span>License</span><span id="license">—</span></div>
        </div>
        <div class="about-links">
          <button type="button" class="about-link" id="repo-link">
            <span>View on GitHub</span>
            <svg viewBox="0 0 24 24"><path d="M7 17L17 7M17 7H9M17 7v8"/></svg>
          </button>
        </div>
        <p class="about-footer">Designed for users who expect the <span class="privacy-dot">best privacy</span> possible.</p>
      </div>
    </aside>
    <script>
      let repoUrl = '';

      function applyData(data) {
        repoUrl = data.repository;
        document.getElementById('tagline').textContent = data.tagline;
        document.getElementById('version').textContent = data.version;
        document.getElementById('license').textContent = data.license;
      }

      document.getElementById('close-btn').addEventListener('click', () => {
        window.aboutApi.close();
      });

      document.getElementById('repo-link').addEventListener('click', () => {
        if (repoUrl) void window.aboutApi.openExternal(repoUrl);
      });

      window.addEventListener('keydown', (event) => {
        if (event.key === 'Escape') window.aboutApi.close();
      });

      window.aboutApi.onData(applyData);
    </script>
  </body>
</html>
