<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>New Tab — 13.13 Browser</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #06080d;
        --surface: #111622;
        --border: #2a3350;
        --text: #eef2ff;
        --muted: #8892b0;
        --accent: #5b8def;
        --privacy: #3ecf8e;
        --private: #a78bfa;
        --raised: 0 1px 0 rgba(255,255,255,0.08), 0 8px 24px rgba(0,0,0,0.45);
        --inset: inset 0 2px 8px rgba(0,0,0,0.5);
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        min-height: 100vh;
        font-family: 'Segoe UI', system-ui, sans-serif;
        background:
          radial-gradient(ellipse 70% 50% at 50% -5%, rgba(91,141,239,0.14), transparent),
          radial-gradient(ellipse 50% 40% at 80% 90%, rgba(62,207,142,0.08), transparent),
          var(--bg);
        color: var(--text);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }
      .brand {
        font-size: 3rem;
        font-weight: 800;
        letter-spacing: -0.04em;
        text-shadow: 0 2px 0 rgba(255,255,255,0.06), 0 8px 24px rgba(0,0,0,0.5);
        margin-bottom: 0.25rem;
      }
      .brand .a { color: var(--accent); }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 4px 12px;
        border-radius: 20px;
        border: 1px solid rgba(62,207,142,0.3);
        background: rgba(62,207,142,0.08);
        color: var(--privacy);
        font-size: 0.75rem;
        font-weight: 600;
        margin-bottom: 2rem;
        box-shadow: var(--raised);
      }
      .search-form { width: min(520px, 100%); }
      .search-form input {
        width: 100%;
        height: 50px;
        padding: 0 1.25rem;
        border-radius: 14px;
        border: 1px solid var(--border);
        background: var(--surface);
        box-shadow: var(--inset);
        color: var(--text);
        font-size: 1rem;
        outline: none;
        transition: box-shadow 0.2s, border-color 0.2s;
      }
      .search-form input:focus {
        border-color: var(--accent);
        box-shadow: var(--inset), 0 0 0 3px rgba(91,141,239,0.2);
      }
      .shortcuts {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
        gap: 0.75rem;
        width: min(520px, 100%);
        margin-top: 2rem;
      }
      .shortcut {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.5rem;
        padding: 1rem 0.75rem;
        border-radius: 14px;
        border: 1px solid var(--border);
        background: linear-gradient(180deg, #171d2e, var(--surface));
        box-shadow: var(--raised);
        color: var(--text);
        text-decoration: none;
        font-size: 0.8rem;
        cursor: pointer;
        transition: transform 0.15s, box-shadow 0.15s;
      }
      .shortcut:hover {
        transform: translateY(-3px);
        box-shadow: var(--raised), 0 0 20px rgba(91,141,239,0.15);
      }
      .shortcut-icon {
        width: 36px; height: 36px;
        border-radius: 10px;
        background: rgba(91,141,239,0.15);
        display: grid;
        place-items: center;
        font-weight: 700;
        color: var(--accent);
        box-shadow: var(--inset);
      }
      .hint {
        margin-top: 2.5rem;
        font-size: 0.75rem;
        color: var(--muted);
        text-align: center;
      }
      kbd {
        padding: 0.15rem 0.4rem;
        border-radius: 5px;
        border: 1px solid var(--border);
        background: var(--surface);
        box-shadow: var(--raised);
        font-family: inherit;
        font-size: 0.72rem;
      }
    </style>
  </head>
  <body>
    <h1 class="brand">13<span class="a">.13</span></h1>
    <div class="badge">🛡 Privacy-first browsing</div>

    <form class="search-form" id="search-form">
      <input type="text" id="search-input" placeholder="Search DuckDuckGo or enter a URL" autofocus spellcheck="false" />
    </form>

    <div class="shortcuts">
      <a class="shortcut" href="https://duckduckgo.com" data-url="https://duckduckgo.com">
        <div class="shortcut-icon">D</div>DuckDuckGo
      </a>
      <a class="shortcut" href="https://github.com" data-url="https://github.com">
        <div class="shortcut-icon">G</div>GitHub
      </a>
      <a class="shortcut" href="https://proton.me" data-url="https://proton.me">
        <div class="shortcut-icon">P</div>Proton
      </a>
      <a class="shortcut" href="https://developer.mozilla.org" data-url="https://developer.mozilla.org">
        <div class="shortcut-icon">M</div>MDN
      </a>
    </div>

    <p class="hint">
      <kbd>Ctrl</kbd>+<kbd>Shift</kbd>+<kbd>N</kbd> private tab &nbsp;·&nbsp;
      <kbd>Ctrl</kbd>+<kbd>T</kbd> new tab &nbsp;·&nbsp;
      <kbd>Ctrl</kbd>+<kbd>L</kbd> address bar
    </p>

    <script>
      const form = document.getElementById('search-form');
      const input = document.getElementById('search-input');
      function navigate(raw) {
        const trimmed = raw.trim();
        if (!trimmed) return;
        let url;
        if (/^https?:\/\//i.test(trimmed)) url = trimmed;
        else if (trimmed.includes('.') && !trimmed.includes(' ')) url = 'https://' + trimmed;
        else url = 'https://duckduckgo.com/?q=' + encodeURIComponent(trimmed);
        window.location.href = url;
      }
      form.addEventListener('submit', (e) => { e.preventDefault(); navigate(input.value); });
      document.querySelectorAll('.shortcut').forEach((el) => {
        el.addEventListener('click', (e) => { e.preventDefault(); navigate(el.dataset.url); });
      });
    </script>
  </body>
</html>
