<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>New Tab — 13.13 Browser</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0a0c10;
        --surface: #12151c;
        --border: #252b38;
        --text: #eef1f7;
        --muted: #8b95a8;
        --accent: #6b93f0;
        --accent-glow: rgba(107, 147, 240, 0.25);
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        min-height: 100vh;
        font-family: 'Segoe UI', system-ui, sans-serif;
        background:
          radial-gradient(ellipse 80% 60% at 50% -10%, rgba(107, 147, 240, 0.12), transparent),
          var(--bg);
        color: var(--text);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }

      .brand {
        font-size: 2.4rem;
        font-weight: 700;
        letter-spacing: -0.03em;
        margin-bottom: 0.35rem;
      }

      .brand span { color: var(--accent); }

      .subtitle {
        color: var(--muted);
        font-size: 0.95rem;
        margin-bottom: 2.5rem;
      }

      .search-form {
        width: min(560px, 100%);
        position: relative;
      }

      .search-form input {
        width: 100%;
        height: 48px;
        padding: 0 1.25rem;
        border-radius: 14px;
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--text);
        font-size: 1rem;
        outline: none;
        transition: border-color 0.15s, box-shadow 0.15s;
      }

      .search-form input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 4px var(--accent-glow);
      }

      .shortcuts {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
        gap: 0.75rem;
        width: min(560px, 100%);
        margin-top: 2rem;
      }

      .shortcut {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.5rem;
        padding: 1rem 0.75rem;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--text);
        text-decoration: none;
        font-size: 0.82rem;
        transition: border-color 0.15s, transform 0.15s;
        cursor: pointer;
      }

      .shortcut:hover {
        border-color: var(--accent);
        transform: translateY(-2px);
      }

      .shortcut-icon {
        width: 32px;
        height: 32px;
        border-radius: 8px;
        background: var(--accent-glow);
        display: grid;
        place-items: center;
        font-weight: 700;
        color: var(--accent);
      }

      .hint {
        margin-top: 2.5rem;
        font-size: 0.78rem;
        color: var(--muted);
      }

      kbd {
        padding: 0.15rem 0.4rem;
        border-radius: 4px;
        border: 1px solid var(--border);
        background: var(--surface);
        font-family: inherit;
        font-size: 0.75rem;
      }
    </style>
  </head>
  <body>
    <h1 class="brand">13<span>.13</span> Browser</h1>
    <p class="subtitle">Private browsing with screen-capture protection</p>

    <form class="search-form" id="search-form">
      <input
        type="text"
        id="search-input"
        placeholder="Search DuckDuckGo or enter a URL"
        autofocus
        spellcheck="false"
      />
    </form>

    <div class="shortcuts">
      <a class="shortcut" href="https://duckduckgo.com" data-url="https://duckduckgo.com">
        <div class="shortcut-icon">D</div>
        DuckDuckGo
      </a>
      <a class="shortcut" href="https://github.com" data-url="https://github.com">
        <div class="shortcut-icon">G</div>
        GitHub
      </a>
      <a class="shortcut" href="https://news.ycombinator.com" data-url="https://news.ycombinator.com">
        <div class="shortcut-icon">Y</div>
        Hacker News
      </a>
      <a class="shortcut" href="https://developer.mozilla.org" data-url="https://developer.mozilla.org">
        <div class="shortcut-icon">M</div>
        MDN Docs
      </a>
    </div>

    <p class="hint">
      <kbd>Ctrl</kbd> + <kbd>T</kbd> new tab &nbsp;·&nbsp;
      <kbd>Ctrl</kbd> + <kbd>W</kbd> close tab &nbsp;·&nbsp;
      <kbd>Ctrl</kbd> + <kbd>L</kbd> focus address bar
    </p>

    <script>
      const form = document.getElementById('search-form');
      const input = document.getElementById('search-input');

      function navigate(raw) {
        const trimmed = raw.trim();
        if (!trimmed) return;

        let url;
        if (/^https?:\/\//i.test(trimmed)) {
          url = trimmed;
        } else if (trimmed.includes('.') && !trimmed.includes(' ')) {
          url = 'https://' + trimmed;
        } else {
          url = 'https://duckduckgo.com/?q=' + encodeURIComponent(trimmed);
        }
        window.location.href = url;
      }

      form.addEventListener('submit', (e) => {
        e.preventDefault();
        navigate(input.value);
      });

      document.querySelectorAll('.shortcut').forEach((el) => {
        el.addEventListener('click', (e) => {
          e.preventDefault();
          navigate(el.dataset.url);
        });
      });
    </script>
  </body>
</html>
